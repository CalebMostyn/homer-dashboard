---
# Homepage configuration
# See https://fontawesome.com/search for icons options

title: "Caleb's Server Dashboard"
subtitle: "Made With Homer"
logo: "logo.png"
#icon: "fas fa-skull-crossbones" # Optional icon

header: true
footer: '<p>Created with <span class="has-text-danger">❤️</span> with <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a> // Fork me on <a href="https://github.com/bastienwirtz/homer"><i class="fab fa-github-alt"></i></a></p>' # set false if you want to hide it.

# Optional theme customization
theme: walkxcode

# Optional theme customization (color overrrides)
# overrrides can also be done using CSS vars 
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#f5f5f5"
    card-background: "#ffffff"
    text: "#363636"
    text-header: "#ffffff"
    text-title: "#303030"
    text-subtitle: "#424242"
    card-shadow: rgba(0, 0, 0, 0.1)
    link: "#3273dc"
    link-hover: "#363636"
  dark:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#131313"
    card-background: "#2b2b2b"
    text: "#eaeaea"
    text-header: "#ffffff"
    text-title: "#fafafa"
    text-subtitle: "#f5f5f5"
    card-shadow: rgba(0, 0, 0, 0.4)
    link: "#3273dc"
    link-hover: "#ffdd57"

# Optional navbar
links: [] # Allows for navbar (dark mode, layout, and search) without any links
#links:
#  - name: "Contribute"
#    icon: "fab fa-github"
#    url: "https://github.com/bastienwirtz/homer"
#    target: "_blank" # optional html a tag target attribute
#  - name: "Wiki"
#    icon: "fas fa-book"
#    url: "https://www.wikipedia.org/"
#   this will link to a second homer page that will load config from additional-page.yml and keep default config values as in config.yml file
#   see url field and assets/additional-page.yml.dist used in this example:
#  - name: "another page!"
#    icon: "fas fa-file-alt"
#    url: "#additional-page" 

# Services
# First level array represent a group.
# Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
services:
  - name: "Server Management"
    icon: "fas fa-server"
    items:
      - name: "Proxmox"
        icon: "fa-solid fa-cloud"
        subtitle: "Hypervisor for Server Resource Management"
        #url: "http://192.168.4.50:8006/"
        url: "http://proxmox.home:8006/"
  - name: "Networking"
    icon: "fas fa-network-wired"
    items:
      - name: "Pi-hole"
        icon: "fa-brands fa-raspberry-pi"
        subtitle: "Ad-blocking and Local DNS Server"
        #url: "http://192.168.4.73/admin"
        url: "http://pi.hole/admin"
  - name: "Web Server"
    icon: "fas fa-sitemap"
    items:
      - name: "Ubuntu Server"
        icon: "fa-brands fa-ubuntu"
        subtitle: "Apache and OpenVPN"
        #url: "http://192.168.4.51"
        url: "http://ubuntu-server.home"
  - name: "Media Server"
    icon: "fas fa-video"
    items:
      - name: "Jellyfin"
        icon: "fa-brands fa-chromecast"
        subtitle: "Media Streaming Server"
        #url: "http://192.168.4.84:8096"
        url: "http://jellyfin.home:8096"
      - name: "Radarr"
        icon: "fa-solid fa-film"
        subtitle: "Automatic Movie Torrent Downloader"
        #url: "http://192.168.4.92:7878/"
        url: "http://radarr.home:7878/"
      - name: "Sonarr"
        icon: "fa-solid fa-tv"
        subtitle: "Automatic TV Torrent Downloader"
        #url: "http://192.168.4.95:8989/"
        url: "http://sonarr.home:8989/"
      - name: "Seerr"
        icon: "fa-solid fa-bell-concierge"
        subtitle: "Radarr and Sonarr Request Manager"
        #url: "http://192.168.4.97:5055"
        url: "http://seerr.home:5055"
  - name: "Torrenting"
    icon: "fas fa-skull-crossbones"
    items:
      - name: "Prowlarr"
        icon: "fa-solid fa-cloud-arrow-up"
        subtitle: "Automatic Torrent Indexer"
        #url: "http://192.168.4.93:9696"
        url: "http://prowlarr.home:9696"
      - name: "Byparr"
        icon: "fa-brands fa-cloudflare"
        subtitle: "Cloudflare Anti-bot Avoider"
        #url: "http://192.168.4.94:8191"
        url: "http://byparr.home:8191"
      - name: "qBittorrent"
        icon: "fa-solid fa-ship"
        subtitle: "Torrent Client Running Through VPN"
        #url: "http://192.168.4.91:8090"
        url: "http://torrent.home:8090"
      - name: "Unmanic"
        icon: "fa-solid fa-minimize"
        subtitle: "Automatic Media Transcoder"
        #url: "http://192.168.4.98:8888"
        url: "http://unmanic.home:8888"
